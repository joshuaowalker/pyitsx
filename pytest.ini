[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

markers =
    unit: Unit tests for individual functions
    integration: Integration tests requiring HMM profiles
    benchmark: Performance benchmarks (may be slow)
    slow: Tests that take a long time to run
